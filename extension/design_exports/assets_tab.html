<!DOCTYPE html>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e0bda",
                        "background-light": "#f6f5f8",
                        "background-dark": "#0f0f1a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }

<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-tab .material-symbols-outlined {

        }

<div class="flex h-screen w-[350px] mx-auto flex-col border-x border-slate-200 dark:border-primary/20 bg-background-light dark:bg-background-dark shadow-2xl relative">
