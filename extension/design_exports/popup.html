<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#0f0f1a",
                        "accent-indigo": "#6366f1",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-mesh {
            background-image: radial-gradient(at 0% 0%, rgba(127, 19, 236, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased">
<!-- Chrome Extension Popup Wrapper (Fixed Width 280px) -->
<div class="w-[280px] min-h-[400px] bg-background-dark relative overflow-hidden flex flex-col bg-mesh">
<!-- Header Section -->
<header class="flex items-center justify-between px-4 pt-5 pb-4 border-b border-primary/10">
<div class="flex items-center gap-2">
<div class="flex items-center justify-center size-8 rounded-lg bg-gradient-to-br from-primary to-accent-indigo shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-xl">auto_awesome</span>
</div>
<div class="flex flex-col">
<h1 class="text-base font-bold leading-none bg-clip-text text-transparent bg-gradient-to-r from-accent-indigo to-primary">
                        DesignGrab
                    </h1>
<span class="text-[10px] text-slate-400 font-medium">Professional Tool</span>
</div>
</div>
<div class="px-2 py-0.5 rounded-full bg-primary/20 border border-primary/30">
<span class="text-[10px] font-bold text-primary">v1.0</span>
</div>
</header>
<!-- Body Section: Action Buttons -->
<main class="flex-1 px-4 py-6 flex flex-col gap-2">
<!-- Primary Action: Export to Figma -->
<button class="group relative flex items-center justify-between w-full p-3 rounded-lg bg-gradient-to-r from-primary to-accent-indigo hover:opacity-90 transition-all shadow-md shadow-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white text-[20px]">diamond</span>
<span class="text-sm font-semibold text-white">Export to Figma</span>
</div>
<span class="text-[9px] uppercase tracking-wider font-bold bg-white/20 px-1.5 py-0.5 rounded text-white">Core</span>
</button>
<!-- Secondary Action: Start Inspecting -->
<button class="flex items-center gap-3 w-full p-3 rounded-lg bg-accent-indigo/10 border border-accent-indigo/20 hover:bg-accent-indigo/20 transition-all group">
<span class="material-symbols-outlined text-accent-indigo text-[20px]">manage_search</span>
<span class="text-sm font-semibold text-slate-100">Start Inspecting</span>
</button>
<!-- Tertiary Action: Extract Assets -->
<button class="flex items-center gap-3 w-full p-3 rounded-lg glass-border bg-white/5 hover:bg-white/10 transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-100 text-[20px]">grid_view</span>
<span class="text-sm font-semibold text-slate-300 group-hover:text-slate-100">Extract Assets</span>
</button>
<!-- Ghost Action: Open Side Panel -->
<button class="flex items-center gap-3 w-full p-3 rounded-lg border border-transparent hover:border-white/10 hover:bg-white/5 transition-all group">
<span class="material-symbols-outlined text-slate-500 group-hover:text-slate-300 text-[20px]">side_navigation</span>
<span class="text-sm font-medium text-slate-400 group-hover:text-slate-300">Open Side Panel</span>
</button>
</main>
<!-- Footer Section -->
<footer class="px-4 py-4 flex items-center justify-between glass-border border-t-0 bg-white/[0.02]">
<div class="flex items-center gap-1.5">
<div class="size-2 rounded-full bg-accent-indigo animate-pulse"></div>
<span class="text-[11px] font-medium text-slate-400">Free Plan</span>
</div>
<div class="flex items-center gap-1.5 px-2 py-1 rounded bg-white/5 border border-white/10">
<span class="text-[9px] font-mono text-slate-500 tracking-tighter">CTRL + SHIFT + D</span>
</div>
</footer>
<!-- Decorative elements -->
<div class="absolute -bottom-10 -left-10 size-32 bg-primary/10 blur-3xl rounded-full pointer-events-none"></div>
<div class="absolute -top-10 -right-10 size-32 bg-accent-indigo/10 blur-3xl rounded-full pointer-events-none"></div>
</div>
</body></html>
