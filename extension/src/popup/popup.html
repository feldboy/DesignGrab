<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesignGrab</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup">
    <header class="popup-header">
      <div class="popup-logo">
        <div class="popup-logo-icon">
          <img src="../assets/icons/icon-32.png" alt="" width="28" height="28">
        </div>
        <div class="popup-logo-text">
          <span class="popup-title">DesignGrab</span>
          <span class="popup-subtitle">Extract any design in seconds</span>
        </div>
      </div>
      <span class="popup-version">v1.0.2</span>
    </header>

    <div class="popup-body" role="group" aria-label="Actions">
      <button id="btn-figma" class="popup-btn figma" aria-label="Export to Figma">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M5.5 2h7l2.5 5-9 9L3.5 7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
          <circle cx="9" cy="7" r="1.5" fill="currentColor"/>
        </svg>
        <span class="popup-btn-content">
          <span class="popup-btn-label">Export to Figma</span>
          <span class="popup-btn-desc">Send design tokens to your project</span>
        </span>
        <span class="popup-btn-badge">Core</span>
      </button>

      <button id="btn-inspect" class="popup-btn primary" aria-label="Start Inspecting">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="popup-btn-content">
          <span class="popup-btn-label">Start Inspecting</span>
          <span class="popup-btn-desc">Hover elements to see styles</span>
        </span>
        <span class="popup-btn-dot" aria-hidden="true"></span>
      </button>

      <div class="popup-divider"></div>

      <button id="btn-assets" class="popup-btn secondary" aria-label="Extract Assets">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="1.5" y="1.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
          <rect x="10.5" y="1.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
          <rect x="1.5" y="10.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
          <rect x="10.5" y="10.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span class="popup-btn-content">
          <span class="popup-btn-label">Extract Assets</span>
          <span class="popup-btn-desc">Images, SVGs, and Lottie files</span>
        </span>
      </button>

      <button id="btn-panel" class="popup-btn ghost" aria-label="Open Side Panel">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="1.5" y="1.5" width="15" height="15" rx="2.5" stroke="currentColor" stroke-width="1.2"/>
          <line x1="11.5" y1="1.5" x2="11.5" y2="16.5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span class="popup-btn-content">
          <span class="popup-btn-label">Open Side Panel</span>
          <span class="popup-btn-desc">Full design inspector view</span>
        </span>
      </button>
    </div>

    <div id="google-signin-section" class="google-signin-section" style="display:none;">
      <button id="btn-google-signin" class="popup-btn google-signin" aria-label="Sign in with Google">
        <div class="signin-spinner" aria-hidden="true"></div>
        <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
    </div>

    <footer class="popup-footer">
      <span class="popup-plan" id="plan-badge">Free</span>
      <span class="popup-shortcut">
        <kbd>⌘</kbd><kbd>⇧</kbd><kbd>G</kbd>
      </span>
    </footer>
  </div>
  <script type="module" src="popup.js"></script>
</body>

</html>
