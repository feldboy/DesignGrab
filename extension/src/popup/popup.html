<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesignGrab</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup">
    <div class="popup-header">
      <div class="popup-logo">
        <img src="../assets/icons/icon-32.png" alt="DesignGrab" width="24" height="24">
        <span class="popup-title">DesignGrab</span>
      </div>
      <span class="popup-version">v1.0</span>
    </div>

    <div class="popup-body">
      <button id="btn-figma" class="popup-btn figma">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M5 2h6l2 4-8 8-2-8z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
          <circle cx="8" cy="6" r="1.5" fill="currentColor"/>
        </svg>
        <span>Export to Figma</span>
        <span class="popup-btn-badge">Core Feature</span>
      </button>

      <button id="btn-inspect" class="popup-btn primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5" />
          <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <span>Start Inspecting</span>
      </button>

      <button id="btn-assets" class="popup-btn secondary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2" />
          <rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2" />
          <rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2" />
          <rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2" />
        </svg>
        <span>Extract Assets</span>
      </button>

      <button id="btn-panel" class="popup-btn ghost">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.2" />
          <line x1="10" y1="1" x2="10" y2="15" stroke="currentColor" stroke-width="1.2" />
        </svg>
        <span>Open Side Panel</span>
      </button>
    </div>

    <div class="popup-footer">
      <span class="popup-plan" id="plan-badge">Free</span>
      <span class="popup-shortcut">Ctrl+Shift+D</span>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>

</html>
